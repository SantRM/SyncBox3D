# Compose raíz: BD + migraciones + backend + frontend.
# Uso:
#   1) copy .env.example .env  (y editar JWT_SECRET, POSTGRES_PASSWORD)
#   2) docker compose up -d --build
#   3) abrir http://localhost:${FRONTEND_PORT:-8081}
#
# El servicio "migrate" aplica las migraciones SQL una sola vez y termina;
# el backend espera a que termine antes de arrancar.

services:
  db:
    build: ./db
    image: syncbox-db:local
    container_name: syncbox-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Por seguridad, Postgres queda accesible solo desde el host.
      # El backend lo consume por la red interna de Docker.
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [syncbox-net]

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: syncbox-migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command: [
      "-path", "/migrations",
      "-database",
      "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable",
      "up"
    ]
    restart: "no"
    networks: [syncbox-net]

  backend:
    build: ./backend
    image: syncbox-backend:local
    container_name: syncbox-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_PORT: 8080
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-30}
      JWT_REFRESH_TTL_HOURS: ${JWT_REFRESH_TTL_HOURS:-168}
      JWT_ISSUER: ${JWT_ISSUER:-syncbox}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-syncbox-app}
      LOGIN_MAX_FAILS: ${LOGIN_MAX_FAILS:-5}
      LOGIN_BLOCK_MIN: ${LOGIN_BLOCK_MIN:-15}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081,http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RESOURCE_ROOT: /data/syncbox/recursos
      MODEL_MAX_MB: ${MODEL_MAX_MB:-500}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [syncbox-net]
    # Exponemos el backend solo en localhost para desarrollo con Vite.
    # En produccion el frontend dockerizado lo consume por proxy interno /api.
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:8080"
    volumes:
      - recursos:/data/syncbox/recursos

  frontend:
    build: ./frontend
    image: syncbox-frontend:local
    container_name: syncbox-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Este es el unico servicio publicado a la red por defecto.
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_PORT:-8081}:8080"
    networks: [syncbox-net]

volumes:
  pgdata:
    name: syncbox-pgdata
  recursos:
    name: syncbox-recursos

networks:
  syncbox-net:
    name: syncbox-net
    driver: bridge
